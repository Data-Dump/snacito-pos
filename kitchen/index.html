<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNACITO POS — Kitchen Display</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="../pos-style.css?v=2">
  <style>
    body { background: #060200; }

    .kitchen-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--bg-card);
      border-bottom: 2px solid var(--border-color);
    }

    .kitchen-header h1 {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--brand-gold);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .kitchen-stats {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .kitchen-stat {
      text-align: center;
    }

    .kitchen-stat-val {
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1;
    }

    .kitchen-stat-val.gold { color: var(--brand-gold); }
    .kitchen-stat-val.orange { color: var(--warning); }
    .kitchen-stat-val.green { color: var(--success); }

    .kitchen-stat-label {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    .kitchen-filter-tabs {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-color);
    }

    .kitchen-filter-btn {
      padding: 6px 16px;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: inherit;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 100px;
      cursor: pointer;
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kitchen-filter-btn:hover { color: var(--text-secondary); }
    .kitchen-filter-btn.active {
      background: var(--brand-gold);
      color: var(--bg-primary);
      border-color: var(--brand-gold);
    }

    .kitchen-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      text-align: center;
    }

    .kitchen-empty-icon { font-size: 5rem; opacity: 0.2; margin-bottom: 16px; }
    .kitchen-empty-text { font-size: 1.2rem; font-weight: 600; color: var(--text-muted); }
    .kitchen-empty-sub { font-size: 0.85rem; color: var(--text-muted); opacity: 0.5; margin-top: 6px; }

    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      margin-right: 6px;
    }

    .kitchen-action-btn {
      flex: 1;
      padding: 10px;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kitchen-action-btn.start { background: var(--warning); color: #000; }
    .kitchen-action-btn.start:hover { background: #e8950b; }
    .kitchen-action-btn.done { background: var(--success); color: #000; }
    .kitchen-action-btn.done:hover { background: #27ae60; }
    .kitchen-action-btn.finish { background: rgba(255,255,255,0.08); color: var(--text-muted); }
    .kitchen-action-btn.finish:hover { background: rgba(255,255,255,0.15); }

    .order-timer {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .order-timer.overdue { color: var(--danger); }

    .updated-badge {
      display: inline-block;
      padding: 2px 10px;
      background: var(--brand-gold);
      color: #000;
      font-size: 0.65rem;
      font-weight: 900;
      border-radius: 4px;
      margin-left: 8px;
      text-transform: uppercase;
      animation: pulse 1s infinite;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      box-shadow: 0 0 10px rgba(212, 160, 23, 0.4);
    }

    .updated-badge:hover {
      background: #fff;
      transform: scale(1.05);
    }

    .updated-badge::after {
      content: ' ×';
      font-size: 0.8rem;
      font-weight: 700;
      opacity: 0.7;
    }

    .kitchen-order-card.order-updated {
      border-color: var(--brand-gold) !important;
      box-shadow: 0 0 40px rgba(212, 160, 23, 0.25) !important;
      animation: updated-card-glow 2s infinite ease-in-out;
    }

    @keyframes updated-card-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(212, 160, 23, 0.15); border-color: var(--brand-gold); }
      50% { box-shadow: 0 0 50px rgba(212, 160, 23, 0.4); border-color: #fff; }
    }

    .kitchen-order-item.item-updated-highlight {
      background: rgba(212, 160, 23, 0.2);
      border-left: 4px solid var(--brand-gold);
      padding-left: 10px;
      margin-left: -11px;
      animation: item-glow-pulse 2s infinite ease-in-out;
      border-radius: 4px;
    }

    .item-update-badge {
      display: inline-block;
      font-size: 0.55rem;
      font-weight: 900;
      background: var(--brand-gold);
      color: #000;
      padding: 1px 4px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @keyframes item-glow-pulse {
      0%, 100% { background: rgba(212, 160, 23, 0.1); }
      50% { background: rgba(212, 160, 23, 0.3); }
    }

    @keyframes flash-item-gold {
      0% { background: rgba(212, 160, 23, 0.4); }
      100% { background: rgba(212, 160, 23, 0.15); }
    }
  </style>
</head>
<body>

  <div class="kitchen-header">
    <div style="display:flex; align-items:center; gap:16px;">
      <h1>🍳 Kitchen Display</h1>
      <span style="font-size:0.75rem; color:var(--success); font-weight:600;"><span class="live-dot"></span>LIVE</span>
    </div>
    <div class="kitchen-stats">
      <div class="kitchen-stat">
        <div class="kitchen-stat-val gold" id="stat-new">0</div>
        <div class="kitchen-stat-label">New</div>
      </div>
      <div class="kitchen-stat">
        <div class="kitchen-stat-val orange" id="stat-preparing">0</div>
        <div class="kitchen-stat-label">Preparing</div>
      </div>
      <div class="kitchen-stat">
        <div class="kitchen-stat-val green" id="stat-completed">0</div>
        <div class="kitchen-stat-label">Completed</div>
      </div>
      <span class="pos-topbar-clock" id="clock" style="margin-left:12px;"></span>
      <nav class="pos-nav-links">
        <a href="../" class="pos-nav-link">Order</a>
        <a href="./" class="pos-nav-link active">Kitchen</a>
        <a href="../dashboard/" class="pos-nav-link">Dashboard</a>
        <a href="#" onclick="logoutPos(); return false;" class="pos-nav-link" style="color:#e74c3c; margin-left:12px;">Logout <span style="font-size:0.8rem">🚪</span></a>
      </nav>
    </div>
  </div>

  <div class="kitchen-filter-tabs">
    <button class="kitchen-filter-btn active" data-filter="active">🔥 Active Orders</button>
    <button class="kitchen-filter-btn" data-filter="new">New</button>
    <button class="kitchen-filter-btn" data-filter="preparing">Preparing</button>
    <button class="kitchen-filter-btn" data-filter="completed">Completed</button>
    <button class="kitchen-filter-btn" data-filter="all">All</button>
  </div>

  <div class="kitchen-grid" id="kitchen-grid">
    <div class="kitchen-empty">
      <div class="kitchen-empty-icon">🍳</div>
      <div class="kitchen-empty-text">Waiting for orders...</div>
      <div class="kitchen-empty-sub">New orders will pop up here in real-time</div>
    </div>
  </div>

  <script src="../pos-app.js?v=2"></script>
  <script>
    const orders = new Map();
    let currentFilter = 'active';
    let knownIds = new Set();
    let lastDataHash = '';

    function buildDataHash() {
      const entries = [...orders.values()].map(o => `${o.id}:${o.status}:${JSON.stringify(o.items)}`).sort().join('|');
      return entries;
    }

    function getItemKey(item) {
      const addons = Array.isArray(item.addons) ? item.addons.map(a => a.name).sort().join(',') : '';
      return `${item.name}|${item.flavour || ''}|${addons}|${item.qty}`;
    }

    function renderKitchen(forceNewIds, forceUpdatedIds) {
      const grid = document.getElementById('kitchen-grid');
      const filtered = [...orders.values()].filter(o => {
        if (currentFilter === 'active') return o.status === 'new' || o.status === 'preparing';
        if (currentFilter === 'all') return true;
        return o.status === currentFilter;
      }).sort((a, b) => {
        const statusOrder = { new: 0, preparing: 1, ready: 2, completed: 3 };
        return (statusOrder[a.status] || 9) - (statusOrder[b.status] || 9) || new Date(b.created_at) - new Date(a.created_at);
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="kitchen-empty">
          <div class="kitchen-empty-icon">🍳</div>
          <div class="kitchen-empty-text">No ${currentFilter === 'active' ? 'active' : currentFilter} orders</div>
          <div class="kitchen-empty-sub">Waiting for incoming orders...</div>
        </div>`;
        updateStats();
        return;
      }

      let html = '';
      filtered.forEach(order => {
        const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
        const isNew = forceNewIds && forceNewIds.has(order.id);
        const hasPersistentUpdate = order.has_update === true;

        html += `<div class="kitchen-order-card status-${order.status}${isNew ? ' new-order-flash' : ''}${hasPersistentUpdate ? ' order-updated' : ''}" id="order-card-${order.id}">`;
        html += `<div class="kitchen-order-header">
          <div>
            <div class="kitchen-order-token">${order.token}${hasPersistentUpdate ? `<span class="updated-badge" onclick="ackUpdate(${order.id}, event)" title="Click to acknowledge">UPDATED</span>` : ''}</div>
            <div class="kitchen-order-customer">${order.customer_name || 'Walk-in'}</div>
          </div>
          <div style="text-align:right;">
            <span class="status-badge ${order.status}">${order.status}</span>
            <div class="order-timer" data-created="${order.created_at}" style="margin-top:6px;"></div>
          </div>
        </div>`;

        if (order.note) {
          html += `<div class="kitchen-order-note">📝 ${order.note}</div>`;
        }

        html += `<div class="kitchen-order-body">`;
        if (Array.isArray(items)) {
          items.forEach(item => {
            const itemKey = getItemKey(item);
            const isItemEdited = order.editedItemKeys && order.editedItemKeys.includes(itemKey);
            
            html += `<div class="kitchen-order-item${isItemEdited ? ' item-updated-highlight' : ''}">
              <div>
                <div class="kitchen-item-name">${item.name}${isItemEdited ? '<span class="item-update-badge">NEW</span>' : ''}</div>`;
            if (item.flavour) html += `<div class="kitchen-item-addons">Flavour: ${item.flavour}</div>`;
            if (item.addons && item.addons.length > 0) {
              html += `<div class="kitchen-item-addons">Add-ons: ${item.addons.map(a => a.name).join(', ')}</div>`;
            }
            html += `</div>
              <div class="kitchen-item-qty">${item.qty}</div>
            </div>`;
          });
        }
        html += `</div>`;

        html += `<div class="kitchen-order-footer">`;
        if (order.status === 'new') {
          html += `<button class="kitchen-action-btn start" onclick="updateStatus(${order.id}, 'preparing')">🔥 Start Preparing</button>`;
        } else if (order.status === 'preparing') {
          html += `<button class="kitchen-action-btn done" onclick="updateStatus(${order.id}, 'completed')">✅ Mark Ready & Complete</button>`;
        }
        html += `</div></div>`;
      });

      grid.innerHTML = html;
      updateStats();
      updateTimers();
    }

    function updateStats() {
      const all = [...orders.values()];
      document.getElementById('stat-new').textContent = all.filter(o => o.status === 'new').length;
      document.getElementById('stat-preparing').textContent = all.filter(o => o.status === 'preparing').length;
      document.getElementById('stat-completed').textContent = all.filter(o => o.status === 'ready' || o.status === 'completed').length;
    }

    function updateTimers() {
      document.querySelectorAll('.order-timer[data-created]').forEach(el => {
        const created = new Date(el.dataset.created);
        const diffSec = Math.floor((Date.now() - created.getTime()) / 1000);
        const mins = Math.floor(diffSec / 60);
        const secs = diffSec % 60;
        el.textContent = `${mins}m ${String(secs).padStart(2, '0')}s`;
        if (mins >= 10) el.classList.add('overdue');
      });
    }

    async function updateStatus(id, newStatus) {
      try {
        await supabaseUpdate('pos_orders', id, { status: newStatus });
        const order = orders.get(id);
        if (order) {
          order.status = newStatus;
          // Clear update highlights when starting preparation or completing
          order.has_update = false;
          order.editedItemKeys = [];
          
          lastDataHash = buildDataHash();
          renderKitchen();
        }
        showToast(`Order ${orders.get(id)?.token || ''} → ${newStatus}`, '🔄');
      } catch (err) {
        console.error('Status update failed:', err);
        showToast('Failed to update status', '❌');
      }
    }

    function ackUpdate(id, event) {
      if (event) event.stopPropagation();
      const order = orders.get(id);
      if (order) {
        order.has_update = false;
        order.editedItemKeys = [];
        renderKitchen();
      }
    }

    document.querySelectorAll('.kitchen-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.kitchen-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderKitchen();
      });
    });

    async function loadOrders() {
      try {
        const data = await supabaseSelect('pos_orders', 'select=*');
        data.forEach(order => { orders.set(order.id, order); knownIds.add(order.id); });
        lastDataHash = buildDataHash();
        renderKitchen();
      } catch (err) { console.error('Failed to load orders:', err); }
    }

    async function pollOrders() {
      try {
        const data = await supabaseSelect('pos_orders', 'select=*');
        let brandNewIds = new Set();
        let changedIds = new Set();
        let hasChanges = false;

        data.forEach(order => {
          const existing = orders.get(order.id);
          if (!existing) {
            orders.set(order.id, order);
            if (knownIds.size > 0) brandNewIds.add(order.id);
            knownIds.add(order.id);
            hasChanges = true;
          } else {
            const oldItems = typeof existing.items === 'string' ? JSON.parse(existing.items) : existing.items;
            const newItems = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            const itemsChanged = JSON.stringify(oldItems) !== JSON.stringify(newItems);
            
            const statusChanged = existing.status !== order.status;
            const otherChanged = existing.note !== order.note || existing.customer_name !== order.customer_name;
            
            if (itemsChanged || statusChanged || otherChanged) {
              if (itemsChanged && Array.isArray(oldItems) && Array.isArray(newItems)) {
                // Determine exactly which item lines changed
                const oldKeys = new Set(oldItems.map(getItemKey));
                order.editedItemKeys = newItems
                  .map(getItemKey)
                  .filter(key => !oldKeys.has(key));
                
                // If items were actually added or quantities changed, mark as update
                if (order.editedItemKeys.length > 0) {
                  order.has_update = true;
                }
              } else if (existing.editedItemKeys) {
                // Persist existing highlight states
                order.editedItemKeys = existing.editedItemKeys;
                order.has_update = existing.has_update;
              }

              orders.set(order.id, order);
              // ALERT ONLY if items changed (not name, phone, or note)
              if (itemsChanged) changedIds.add(order.id);
              hasChanges = true;
            }
          }
        });

        if (data.length !== orders.size) {
          const remoteIds = new Set(data.map(o => o.id));
          for (const id of orders.keys()) {
            if (!remoteIds.has(id)) { orders.delete(id); hasChanges = true; }
          }
        }

        if (hasChanges) {
          lastDataHash = buildDataHash();
          if (brandNewIds.size > 0 || changedIds.size > 0) {
            playNotificationSound();
            renderKitchen(brandNewIds, changedIds);
          } else {
            renderKitchen();
          }
        }
        updateStats();
      } catch (err) { /* retry */ }
    }

    loadOrders().then(() => { setInterval(pollOrders, 2500); });
    startClock('clock');
    setInterval(updateTimers, 1000);

    document.addEventListener('click', () => {
      if (!window._audioUnlocked) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        ctx.resume();
        window._audioUnlocked = true;
      }
    }, { once: true });
  </script>
</body>
</html>
