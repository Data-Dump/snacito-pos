<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNACITO POS — Orders</title>
  <link rel="stylesheet" href="pos-style.css?v=2">
  <style>
    .orders-page { padding: 20px; max-width: 1600px; margin: 0 auto; }

    /* ─── Order Cards Grid ─── */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* New Order Card (the + button) */
    .new-order-card {
      border: 2px dashed var(--brand-gold);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      cursor: pointer;
      transition: var(--transition);
      background: rgba(212, 160, 23, 0.03);
    }

    .new-order-card:hover {
      background: rgba(212, 160, 23, 0.1);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(212, 160, 23, 0.15);
    }

    .new-order-card .plus-icon {
      font-size: 3rem;
      color: var(--brand-gold);
      line-height: 1;
      margin-bottom: 8px;
    }

    .new-order-card .plus-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--brand-gold);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Order Card */
    .order-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      min-height: 220px;
      display: flex;
      flex-direction: column;
    }

    .order-card:hover {
      border-color: var(--brand-gold);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(212, 160, 23, 0.1);
    }

    .order-card.draft { border-color: var(--brand-gold); }
    .order-card.sent { border-color: var(--success); opacity: 0.85; }
    .order-card.unpaid { border-color: var(--danger) !important; border-width: 2.5px; opacity: 1 !important; box-shadow: 0 0 15px rgba(231, 76, 60, 0.2); }
    .order-card.sent:hover { opacity: 1; }

    .order-card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-color);
    }

    .order-card-token {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--brand-gold);
      letter-spacing: 1px;
    }

    .order-card-customer {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .order-card-body {
      padding: 12px 16px;
      flex: 1;
    }

    .order-card-item-line {
      font-size: 0.78rem;
      color: var(--text-secondary);
      padding: 3px 0;
      display: flex;
      justify-content: space-between;
    }

    .order-card-item-line .oname { flex: 1; }
    .order-card-item-line .oqty {
      color: var(--text-muted);
      font-weight: 600;
      margin-left: 8px;
    }

    .order-card-empty {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 20px 0;
      opacity: 0.5;
    }

    .order-card-footer {
      padding: 10px 16px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .order-card-total {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--brand-gold);
    }

    .order-card-time {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* Draft badge */
    .card-badge-draft {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      background: var(--brand-gold-dim);
      color: var(--brand-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-badge-sent {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      background: var(--success-dim);
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ─── Editing Panel (slide-in right side) ─── */
    .edit-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: none;
    }

    .edit-overlay.show { display: flex; justify-content: flex-end; }

    .edit-panel {
      width: 95vw;
      max-width: 1400px;
      height: 100vh;
      background: var(--bg-primary);
      border-left: 2px solid var(--border-color);
      display: flex;
      flex-direction: column;
      animation: slideInPanel 0.3s ease;
      overflow: hidden;
    }

    @keyframes slideInPanel {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    .edit-panel-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .edit-panel-header h2 {
      font-size: 1rem;
      font-weight: 800;
      color: var(--brand-gold);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .edit-panel-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .edit-panel-close:hover {
      color: var(--danger);
      border-color: var(--danger);
    }

    .edit-panel-body {
      flex: 1;
      overflow: hidden; 
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 420px;
    }

    .edit-left {
      padding: 16px 24px;
      overflow-y: auto;
      border-right: 1px solid var(--border-color);
    }

    .edit-right {
      padding: 16px 20px;
      overflow-y: auto;
      background: rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    .edit-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      margin-top: 16px;
    }

    .edit-section-title:first-child { margin-top: 0; }

    /* Menu items inside edit panel */
    .edit-menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .edit-menu-btn {
      padding: 10px 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
    }

    .edit-menu-btn:hover {
      border-color: var(--brand-gold);
      background: var(--bg-card-hover);
    }

    .edit-menu-btn.has-qty {
      border-color: var(--brand-gold);
      background: var(--brand-gold-dim);
    }

    .edit-menu-btn .em-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .edit-menu-btn .em-price {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--brand-gold);
      margin-top: 2px;
    }

    .edit-menu-btn .em-qty {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--brand-gold);
      background: var(--brand-gold);
      color: var(--bg-primary);
      padding: 1px 6px;
      border-radius: 4px;
      float: right;
      margin-top: -20px;
    }

    /* Cart items in edit panel */
    .edit-cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg-card);
      border: 1.2px solid var(--border-color);
      border-radius: 12px;
      margin-bottom: 8px;
      transition: var(--transition);
    }
    .edit-cart-item:hover { border-color: var(--brand-gold); }
    .edit-cart-item.unpaid { border-left: 4px solid var(--danger); }
    .edit-cart-item.paid { border-left: 4px solid var(--success); }

    .item-paid-box {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      border: 1px solid var(--border-color);
      transition: 0.2s;
    }
    .item-paid-box.no { background: rgba(231, 76, 60, 0.1); color: var(--danger); border-color: var(--danger); }
    .item-paid-box.yes { background: rgba(46, 204, 113, 0.1); color: var(--success); border-color: var(--success); }

    .eci-info { flex: 1; }
    .eci-name { font-size: 0.85rem; font-weight: 700; color: var(--text-primary); }
    .eci-detail { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    .eci-price { font-size: 0.9rem; font-weight: 900; color: var(--brand-gold); text-align: right; }

    .qty-controls { display: flex; align-items: center; gap: 8px; margin: 0 10px; }
    .qty-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-surface); color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .qty-btn:hover { border-color: var(--brand-gold); color: var(--brand-gold); }
    .qty-btn.remove { color: var(--danger); border-color: rgba(231,76,60,0.2); }
    .qty-btn.remove:hover { background: var(--danger); color: #fff; }

    .edit-panel-footer {
      padding: 16px 24px;
      background: var(--bg-card);
      border-top: 2px solid var(--border-color);
      flex-shrink: 0;
    }

    .edit-customer-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .edit-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .edit-total-label { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .edit-total-value { font-size: 1.8rem; font-weight: 900; color: var(--brand-gold); }

    .bulk-paid-btn {
      padding: 10px;
      width: 100%;
      background: var(--success-dim);
      color: var(--success);
      border: 1.5px solid var(--success);
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: var(--transition);
    }
    .bulk-paid-btn:hover { background: var(--success); color: #000; }

    /* Sent order view-only (Modified to allow editing) */
    .edit-panel.is-sent .edit-panel-footer .btn-primary#btn-send-order { display: none; }

    /* ─── Online Orders Card ─── */
    .online-orders-card {
      border: 2px dashed var(--success);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      cursor: pointer;
      transition: var(--transition);
      background: rgba(46, 204, 113, 0.03);
      position: relative;
    }

    .online-orders-card:hover {
      background: rgba(46, 204, 113, 0.1);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(46, 204, 113, 0.15);
    }

    .online-orders-card .ol-icon {
      font-size: 2.5rem;
      line-height: 1;
      margin-bottom: 8px;
    }

    .online-orders-card .ol-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .online-orders-card .ol-count {
      margin-top: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      background: var(--success);
      color: var(--bg-primary);
      padding: 3px 10px;
      border-radius: 100px;
    }

    .online-orders-card .ol-count.zero { background: var(--text-muted); }

    /* ─── Online Orders Modal ─── */
    .online-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 250;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .online-modal-overlay.show { display: flex; }

    .online-modal {
      background: var(--bg-primary);
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-lg);
      width: 620px;
      max-width: 95vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      animation: popIn 0.3s ease;
    }

    .online-modal-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .online-modal-header h2 {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .online-modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }

    .online-order-row {
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      cursor: pointer;
      transition: var(--transition);
    }

    .online-order-row:hover {
      border-color: var(--success);
      background: var(--bg-card-hover);
    }

    .online-order-row.already-imported {
      opacity: 0.45;
      pointer-events: none;
    }

    .oo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .oo-id {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--brand-gold);
      letter-spacing: 0.5px;
    }

    .oo-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .oo-amount {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--brand-gold);
    }

    .oo-items {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: pre-line;
      line-height: 1.5;
      max-height: 80px;
      overflow: hidden;
    }

    .oo-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .oo-time {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .oo-import-badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--success);
      color: var(--bg-primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .oo-imported-badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--text-muted);
      color: var(--bg-primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .online-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .online-empty-icon { font-size: 3rem; opacity: 0.3; margin-bottom: 8px; }
    .online-empty-text { font-size: 0.9rem; font-weight: 600; }

    /* WhatsApp popup */
    .wa-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 350;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .wa-popup-overlay.show { display: flex; }
    .wa-popup {
      background: var(--bg-card);
      border: 2px solid #25D366;
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      max-width: 420px;
      width: 90vw;
      text-align: center;
      animation: popIn 0.3s ease;
    }
    .wa-popup-icon { font-size: 3rem; margin-bottom: 12px; }
    .wa-popup-title { font-size: 1.1rem; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
    .wa-popup-sub { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 18px; line-height: 1.5; }
    .wa-popup-btn {
      display: inline-block;
      padding: 14px 32px;
      background: #25D366;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: 0.2s;
    }
    .wa-popup-btn:hover { background: #1ebe5d; transform: scale(1.03); }
    .wa-popup-skip {
      display: block;
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="pos-topbar">
    <div class="pos-topbar-brand">
      <h1>SNACITO</h1>
      <div><div class="screen-label">Point of Sale</div></div>
    </div>
    <div class="pos-topbar-actions">
      <span class="pos-topbar-clock" id="clock"></span>
      <nav class="pos-nav-links">
        <a href="./" class="pos-nav-link active">Order</a>
        <a href="./kitchen/" class="pos-nav-link">Kitchen</a>
        <a href="./dashboard/" class="pos-nav-link">Dashboard</a>
        <a href="#" onclick="logoutPos(); return false;" class="pos-nav-link" style="color:#e74c3c; margin-left:12px;">Logout <span style="font-size:0.8rem">🚪</span></a>
      </nav>
    </div>
  </div>

  <div class="orders-page">
    <div class="orders-grid" id="orders-grid">
      <!-- Cards rendered by JS -->
    </div>
  </div>

  <!-- Edit Panel Overlay -->
  <div class="edit-overlay" id="edit-overlay">
    <div class="edit-panel" id="edit-panel">
      <div class="edit-panel-header">
        <h2 id="edit-title">New Order</h2>
        <button class="edit-panel-close" onclick="closeEditPanel()">✕</button>
      </div>
      <div class="edit-panel-body">
        <div class="edit-left" id="edit-left">
          <!-- Menu selection grid -->
        </div>
        <div class="edit-right" id="edit-right">
          <!-- Cart items list -->
        </div>
      </div>
      <div class="edit-panel-footer" id="edit-footer">
        <div style="display:flex; gap:20px;">
          <div style="flex:1;">
             <div class="edit-customer-row">
              <input type="text" class="pos-input" id="edit-customer" placeholder="Customer Name (required)">
              <input type="text" class="pos-input" id="edit-note" placeholder="Note...">
            </div>
            <div class="edit-customer-row" style="margin-bottom:0px;">
              <div style="display:flex; align-items:center; gap:0; flex:1; background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius-sm); overflow:hidden;">
                <span style="padding:0 10px; font-size:0.8rem; font-weight:600; color:var(--text-muted); white-space:nowrap;">+91</span>
                <input type="tel" class="pos-input" id="edit-phone" placeholder="Phone Number (or 0)" maxlength="10" style="border:none; border-left:1px solid var(--border-color); border-radius:0;">
              </div>
            </div>
          </div>
          <div style="width:300px; display:flex; flex-direction:column; justify-content:center; border-left:1px solid var(--border-color); padding-left:20px;">
            <div class="edit-customer-row" style="margin-bottom:12px; align-items:center; gap:12px;">
              <span style="font-size:0.75rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Global:</span>
              <label class="pos-toggle">
                <input type="checkbox" id="edit-paid" checked onchange="toggleGlobalPaid(this.checked)">
                <span class="pos-toggle-slider"></span>
              </label>
              <span id="edit-paid-label" style="font-size:0.85rem; font-weight:800; color:var(--success);">PAID</span>
            </div>
            <div class="edit-total-row">
              <span class="edit-total-label">Total</span>
              <span class="edit-total-value" id="edit-total">₹0</span>
            </div>
          </div>
        </div>

        <div style="display:flex; gap:12px; margin-top:16px;">
          <button class="btn-primary" id="btn-send-order" disabled style="flex:2;">🔔 Send to Kitchen</button>
          <button class="btn-primary" id="btn-update-order" style="display:none; background:var(--brand-gold); flex:2;">💾 Update Order</button>
          <a class="btn-primary" id="btn-send-wa" href="#" target="_blank" style="display:none; background:#25D366; text-decoration:none; color:#fff; flex:1; display:flex; align-items:center; justify-content:center;">📱 WhatsApp</a>
          <button class="btn-primary" id="btn-delete-order" style="background:var(--danger); border-color:var(--danger); width:auto; padding:0 12px; min-width:unset;" onclick="deleteOrder()">🗑️</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Addon/Flavour Modal -->
  <div class="pos-modal-overlay" id="addon-modal" style="z-index:300;">
    <div class="pos-modal">
      <h2 id="modal-title">Customize</h2>
      <div id="modal-body"></div>
      <div style="display:flex; gap:8px; margin-top:20px;">
        <button class="btn-secondary" onclick="closeAddonModal()" style="flex:1;">Cancel</button>
        <button class="btn-primary" id="modal-confirm" style="flex:1;">Add</button>
      </div>
    </div>
  </div>

  <!-- Online Orders Modal -->
  <div class="online-modal-overlay" id="online-modal">
    <div class="online-modal">
      <div class="online-modal-header">
        <h2>📱 Online Orders</h2>
        <button class="edit-panel-close" onclick="closeOnlineModal()">✕</button>
      </div>
      <div class="online-modal-body" id="online-modal-body">
        <div class="online-empty">
          <div class="online-empty-icon">📱</div>
          <div class="online-empty-text">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="pos-app.js?v=2"></script>
  <script>
    // ═══════════════════════════════════════════
    //  STATE: All orders stored as cards
    // ═══════════════════════════════════════════

    let allCards = []; 
    let editingCardId = null;
    let cardCounter = parseInt(localStorage.getItem('snk_card_counter') || '0');
    let onlineOrders = [];
    let onlineOrderCount = 0;
    let importedOnlineIds = JSON.parse(localStorage.getItem('snk_imported_online') || '[]');

    function saveToLocalStorage() {
      const drafts = allCards.filter(c => c.status === 'draft');
      localStorage.setItem('snk_drafts', JSON.stringify(drafts));
      localStorage.setItem('snk_card_counter', String(cardCounter));
      localStorage.setItem('snk_imported_online', JSON.stringify(importedOnlineIds));
    }

    function loadFromLocalStorage() {
      try {
        const raw = localStorage.getItem('snk_drafts');
        if (raw) {
          const drafts = JSON.parse(raw);
          drafts.forEach(d => { d.status = 'draft'; allCards.push(d); });
        }
      } catch (e) { }
    }

    async function loadSentOrders() {
      try {
        const data = await supabaseSelect('pos_orders', 'select=*');
        data.forEach(order => {
          let card = allCards.find(c => c.token === order.token && c.status === 'sent');
          if (card) {
            card.dbStatus = order.status;
            card.paymentStatus = order.payment_status || 'paid';
            return;
          }
          const items = order.items || [];
          allCards.push({
            id: 'sent-' + order.id,
            dbId: order.id,
            token: order.token,
            cart: items.map(i => ({
              name: i.name, qty: i.qty, price: i.price,
              flavour: i.flavour, addons: i.addons || [],
              paid: i.paid !== false
            })),
            customerName: order.customer_name,
            note: order.note,
            status: 'sent',
            dbStatus: order.status,
            paymentStatus: order.payment_status || 'paid',
            total: order.total,
            createdAt: order.created_at,
            sentAt: order.created_at
          });
        });
        renderGrid();
      } catch (e) { }
    }

    function calcCardTotal(card) {
      if (!card || !card.cart) return 0;
      return card.cart.reduce((sum, entry) => {
        const base = entry.menuItem?.price || entry.price || 0;
        const flvPrice = (entry.flavour && typeof entry.flavour === 'object') ? (entry.flavour.price || 0) : 0;
        const addonSum = (entry.addons || []).reduce((s, a) => s + (a.price || 0), 0);
        return sum + (base + flvPrice + addonSum) * (entry.qty || 1);
      }, 0);
    }

    async function generateToken() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let token = '';
      for (let i = 0; i < 4; i++) token += chars.charAt(Math.floor(Math.random() * chars.length));
      return token;
    }

    function renderGrid() {
      const grid = document.getElementById('orders-grid');
      let html = `
        <div class="new-order-card" onclick="createNewOrder()">
          <div class="plus-icon">+</div><div class="plus-label">New Order</div>
        </div>
        <div class="online-orders-card" onclick="openOnlineModal()">
          <div class="ol-icon">📱</div><div class="ol-label">Online</div>
          <div class="ol-count ${onlineOrderCount === 0 ? 'zero' : ''}" id="ol-count-badge">${onlineOrderCount} pending</div>
        </div>`;

      const sorted = [...allCards].sort((a, b) => {
        const aUnpaid = a.status === 'sent' && a.paymentStatus === 'unpaid';
        const bUnpaid = b.status === 'sent' && b.paymentStatus === 'unpaid';
        if (aUnpaid && !bUnpaid) return -1;
        if (!aUnpaid && bUnpaid) return 1;
        if (a.status === 'draft' && b.status === 'sent') return -1;
        if (a.status === 'sent' && b.status === 'draft') return 1;
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      sorted.forEach(card => {
        const total = calcCardTotal(card);
        const isUnpaid = card.status === 'sent' && card.paymentStatus === 'unpaid';
        html += `
          <div class="order-card ${card.status} ${isUnpaid ? 'unpaid' : ''}" onclick="openEditPanel('${card.id}')">
            <div class="order-card-header">
              <div>
                <div class="order-card-token">${card.token}</div>
                <div class="order-card-customer">${card.customerName || 'Walk-in'}</div>
              </div>
              ${card.status === 'draft' ? '<span class="card-badge-draft">Draft</span>' : `<span class="card-badge-sent" style="background:${getStatusColor(card.dbStatus)}22; color:${getStatusColor(card.dbStatus)}">${card.dbStatus}</span>`}
            </div>
            <div class="order-card-body">`;
        
        if (card.cart.length === 0) {
          html += `<div class="order-card-empty">Empty</div>`;
        } else {
          card.cart.slice(0, 5).forEach(item => {
            const name = item.menuItem?.name || item.name;
            const dot = item.paid === false ? '<span style="color:var(--danger)">● </span>' : '';
            html += `<div class="order-card-item-line"><span class="oname">${dot}${name}</span><span class="oqty">x${item.qty}</span></div>`;
          });
          if (card.cart.length > 5) html += `<div class="order-card-item-line" style="color:var(--text-muted); font-style:italic;">+${card.cart.length-5} more</div>`;
        }

        html += `</div>
            <div class="order-card-footer">
              <div class="order-card-total">₹${total}</div>
              <div class="order-card-time">${card.createdAt ? new Date(card.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</div>
            </div>
          </div>`;
      });
      grid.innerHTML = html;
    }

    function getStatusColor(s) {
      if (s === 'new') return '#f1c40f';
      if (s === 'preparing') return '#3498db';
      if (s === 'ready') return '#2ecc71';
      return '#95a5a6';
    }

    async function createNewOrder() {
      cardCounter++;
      const token = await generateToken();
      const newCard = { id: 'draft-' + cardCounter, token, cart: [], customerName: '', note: '', phone: '', status: 'draft', createdAt: new Date().toISOString(), paymentStatus: 'paid' };
      allCards.unshift(newCard);
      saveToLocalStorage();
      renderGrid();
      openEditPanel(newCard.id);
    }

    function openEditPanel(id) {
      editingCardId = id;
      const card = allCards.find(c => c.id === id);
      if (!card) return;
      document.getElementById('edit-title').textContent = (card.status==='draft'?'New Order ':'Edit Order ') + card.token;
      document.getElementById('edit-customer').value = card.customerName || '';
      document.getElementById('edit-note').value = card.note || '';
      document.getElementById('edit-phone').value = card.phone || '';
      document.getElementById('edit-paid').checked = (card.paymentStatus !== 'unpaid');
      updatePaidLabel();
      renderEditBody();
      document.getElementById('edit-overlay').classList.add('show');
      validateDraftEnable();
      updateWaButton();
    }

    function closeEditPanel() {
      const card = allCards.find(c => c.id === editingCardId);
      if (card && card.status === 'draft') {
        card.customerName = document.getElementById('edit-customer').value.trim();
        card.note = document.getElementById('edit-note').value.trim();
        card.phone = document.getElementById('edit-phone').value.trim();
        if (card.cart.length === 0) allCards = allCards.filter(c => c.id !== card.id);
        saveToLocalStorage();
      }
      editingCardId = null;
      document.getElementById('edit-overlay').classList.remove('show');
      renderGrid();
    }

    document.getElementById('edit-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditPanel(); });

    function renderEditBody() {
      const card = allCards.find(c => c.id === editingCardId);
      if (!card) return;
      const left = document.getElementById('edit-left');
      const right = document.getElementById('edit-right');

      // Cart Side
      let rHtml = `<button class="bulk-paid-btn" onclick="markAllPaid()">✅ Mark All Paid</button>`;
      if (card.cart.length === 0) rHtml += `<div style="text-align:center; color:var(--text-muted); padding:60px 0;">Empty</div>`;
      else {
        card.cart.forEach((item, idx) => {
          const isPaid = item.paid !== false;
          const price = (item.menuItem?.price || item.price || 0) + (item.flavour?.price || 0);
          const addonCost = (item.addons || []).reduce((s, a) => s + (a.price || 0), 0);
          const total = (price + addonCost) * item.qty;
          let details = item.flavour ? (typeof item.flavour === 'object' ? item.flavour.name : item.flavour) : '';
          if (item.addons?.length) details += (details?' · ':'') + item.addons.map(a=>a.name).join(', ');

          rHtml += `<div class="edit-cart-item ${isPaid?'paid':'unpaid'}">
            <div class="item-paid-box ${isPaid?'yes':'no'}" onclick="toggleItemPaid(${idx})">${isPaid?'₹':'○'}</div>
            <div class="eci-info"><div class="eci-name">${item.menuItem?.name || item.name}</div><div class="eci-detail">${details}</div></div>
            <div class="qty-controls">
              <button class="qty-btn" onclick="editChangeQty(${idx},-1)">−</button><span class="qty-val">${item.qty}</span><button class="qty-btn" onclick="editChangeQty(${idx},1)">+</button>
              <button class="qty-btn remove" onclick="editDeleteItem(${idx})">✕</button>
            </div>
            <div class="eci-price">₹${total}</div>
          </div>`;
        });
      }
      right.innerHTML = rHtml;

      // Menu Side
      let lHtml = `<div style="padding-bottom:16px; border-bottom:1px solid var(--border-color); margin-bottom:16px;">
        <div class="edit-section-title" style="margin-top:0; color:var(--success)">➕ Custom Item</div>
        <div style="display:flex; gap:8px;">
          <input type="text" class="pos-input" id="custom-name" placeholder="Name" style="flex:2"><input type="number" class="pos-input" id="custom-price" placeholder="Price" style="flex:1">
          <button class="btn-primary" onclick="addCustomItem()" style="width:auto; padding:0 16px; background:var(--success)">Add</button>
        </div>
      </div>`;
      MENU.categories.forEach(cat => {
        lHtml += `<div class="edit-section-title" style="color:var(--brand-gold)">${cat.icon} ${cat.name}</div><div class="edit-menu-grid">`;
        cat.items.forEach(it => {
          const qty = card.cart.filter(c => (c.menuItem?.id || c.id) === it.id).reduce((s,c)=>s+c.qty, 0);
          lHtml += `<button class="edit-menu-btn ${qty>0?'has-qty':''}" onclick="editAddItem('${it.id}')">${qty>0?`<span class="em-qty">${qty}</span>`:''}<div class="em-name">${it.name}</div><div class="em-price">₹${it.price}</div></button>`;
        });
        lHtml += `</div>`;
      });
      left.innerHTML = lHtml;
      updateEditTotal();
    }

    function toggleItemPaid(idx) {
      const card = allCards.find(c => c.id === editingCardId);
      if (card) { card.cart[idx].paid = (card.cart[idx].paid === false); syncGlobalPayment(); renderEditBody(); }
    }

    function markAllPaid() {
      const card = allCards.find(c => c.id === editingCardId);
      if (card) { card.cart.forEach(i => i.paid = true); card.paymentStatus = 'paid'; document.getElementById('edit-paid').checked = true; updatePaidLabel(); renderEditBody(); }
    }

    function syncGlobalPayment() {
      const card = allCards.find(c => c.id === editingCardId);
      if (card) {
        const allDone = card.cart.length > 0 && card.cart.every(i => i.paid !== false);
        card.paymentStatus = allDone ? 'paid' : 'unpaid';
        document.getElementById('edit-paid').checked = allDone;
        updatePaidLabel();
      }
    }

    function updateEditTotal() {
      const card = allCards.find(c => c.id === editingCardId);
      if (card) { document.getElementById('edit-total').textContent = `₹${calcCardTotal(card)}`; validateDraftEnable(); }
    }

    function updatePaidLabel() {
      const isPaid = document.getElementById('edit-paid').checked;
      const lbl = document.getElementById('edit-paid-label');
      if (lbl) { lbl.textContent = isPaid ? 'PAID' : 'NOT PAID'; lbl.style.color = isPaid ? 'var(--success)' : 'var(--danger)'; }
    }

    function toggleGlobalPaid(isPaid) {
      const card = allCards.find(c => c.id === editingCardId);
      if (card) { card.paymentStatus = isPaid ? 'paid' : 'unpaid'; if (isPaid) card.cart.forEach(i => i.paid = true); updatePaidLabel(); renderEditBody(); }
    }

    function validateDraftEnable() {
      const card = allCards.find(c => c.id === editingCardId); if (!card) return;
      const n = document.getElementById('edit-customer').value.trim();
      const p = document.getElementById('edit-phone').value.trim();
      const valid = (n.length > 0) && (p === '0' || /^\d{10}$/.test(p)) && (card.cart.length > 0);
      const isD = card.status === 'draft';
      document.getElementById('btn-send-order').style.display = isD ? '' : 'none'; document.getElementById('btn-send-order').disabled = !valid;
      document.getElementById('btn-update-order').style.display = isD ? 'none' : ''; document.getElementById('btn-update-order').disabled = !valid;
    }

    function editAddItem(id) {
      const card = allCards.find(c => c.id === editingCardId); if (!card) return;
      const it = findMenuItem(id); if (!it) return;
      if (it.hasFlavours || it.hasAddons) { openAddonModalForEdit(it); }
      else {
        const ex = card.cart.find(c => (c.menuItem?.id) === id && !c.flavour);
        if (ex) ex.qty++; else card.cart.push({ menuItem: it, qty: 1, flavour: null, addons: [], paid: card.paymentStatus !== 'unpaid' });
        saveToLocalStorage(); renderEditBody();
      }
    }

    function editChangeQty(idx, d) {
      const card = allCards.find(c => c.id === editingCardId); if (!card) return;
      card.cart[idx].qty += d; if (card.cart[idx].qty <= 0) card.cart.splice(idx, 1);
      if (card.status === 'draft') saveToLocalStorage(); renderEditBody();
    }

    function editDeleteItem(idx) {
      const card = allCards.find(c => c.id === editingCardId); if (card) { card.cart.splice(idx, 1); if (card.status === 'draft') saveToLocalStorage(); renderEditBody(); }
    }

    function addCustomItem() {
      const card = allCards.find(c => c.id === editingCardId); if (!card) return;
      const n = document.getElementById('custom-name').value.trim(), p = parseInt(document.getElementById('custom-price').value);
      if (!n || isNaN(p)) return;
      card.cart.push({ name: n, price: p, qty: 1, flavour: null, addons: [], paid: card.paymentStatus !== 'unpaid' });
      document.getElementById('custom-name').value = ''; document.getElementById('custom-price').value = '';
      if (card.status === 'draft') saveToLocalStorage(); renderEditBody();
    }

    function openAddonModalForEdit(it) {
      const m = document.getElementById('addon-modal'), b = document.getElementById('modal-body');
      document.getElementById('modal-title').textContent = it.name; let h = '';
      if (it.hasFlavours && it.flavours) {
        h += `<div class="chip-label">Flavor</div><div class="chip-group">`;
        it.flavours.forEach((f, i) => { const n = typeof f==='object'?f.name:f, p = typeof f==='object'?f.price:0; h += `<label class="chip ${i===0?'selected':''}" onclick="toggleRadioChip(this)"><input type="radio" name="modal-flavour" value="${n}" data-price="${p}" ${i===0?'checked':''}><span>${n} ${p?`+₹${p}`:''}</span></label>`; });
        h += `</div>`;
      }
      if (it.hasAddons && it.addons) {
        h += `<div class="chip-label" style="margin-top:10px">Addons</div><div class="chip-group">`;
        it.addons.forEach(a => { h += `<label class="chip" onclick="toggleCheckChip(this)"><input type="checkbox" name="modal-addon" value="${a.name}" data-price="${a.price}"><span>${a.name} +₹${a.price}</span></label>`; });
        h += `</div>`;
      }
      b.innerHTML = h; m.classList.add('show');
      document.getElementById('modal-confirm').onclick = () => {
        const card = allCards.find(c => c.id === editingCardId), flv = b.querySelector('input[name="modal-flavour"]:checked');
        const flavour = flv ? { name: flv.value, price: parseInt(flv.dataset.price) || 0 } : null, adds = [];
        b.querySelectorAll('input[name="modal-addon"]:checked').forEach(cb => adds.push({ name: cb.value, price: parseInt(cb.dataset.price) }));
        card.cart.push({ menuItem: it, qty: 1, flavour, addons: adds, paid: card.paymentStatus !== 'unpaid' });
        saveToLocalStorage(); closeAddonModal(); renderEditBody();
      };
    }

    function closeAddonModal() { document.getElementById('addon-modal').classList.remove('show'); }
    function toggleRadioChip(l) { l.closest('.chip-group').querySelectorAll('.chip').forEach(c=>c.classList.remove('selected')); l.classList.add('selected'); }
    function toggleCheckChip(l) { setTimeout(() => { l.classList.toggle('selected', l.querySelector('input').checked); }, 0); }
    function findMenuItem(id) { for (const c of MENU.categories) { for (const i of c.items) { if (i.id === id) return i; } } return null; }

    document.getElementById('btn-send-order').addEventListener('click', async () => {
      const card = allCards.find(c => c.id === editingCardId); if (!card) return;
      const btn = document.getElementById('btn-send-order'); btn.disabled = true; btn.textContent = '...';
      const items = card.cart.map(e => ({ name: e.menuItem?.name || e.name, qty: e.qty, price: (e.menuItem?.price || e.price || 0) + (e.flavour?.price || 0), flavour: e.flavour?.name || e.flavour, addons: e.addons, paid: e.paid !== false }));
      try {
        const res = await supabaseInsert('pos_orders', { token: card.token, items, customer_name: document.getElementById('edit-customer').value, note: document.getElementById('edit-note').value + (document.getElementById('edit-phone').value ? ' | Phone: ' + document.getElementById('edit-phone').value : ''), status: 'new', total: calcCardTotal(card), payment_status: card.paymentStatus });
        card.status = 'sent'; if (res?.id) card.dbId = res.id; saveToLocalStorage(); showToast('Sent!', '🔔'); closeEditPanel();
      } catch (e) { showToast('Error', '❌'); }
      btn.disabled = false; btn.textContent = '🔔 Send to Kitchen';
    });

    document.getElementById('btn-update-order').addEventListener('click', async () => {
      const card = allCards.find(c => c.id === editingCardId); if (!card) return;
      const btn = document.getElementById('btn-update-order'); btn.disabled = true;
      const items = card.cart.map(e => ({ name: e.menuItem?.name || e.name, qty: e.qty, price: (e.menuItem?.price || e.price || 0) + (e.flavour?.price || 0), flavour: e.flavour?.name || e.flavour, addons: e.addons, paid: e.paid !== false }));
      try {
        await supabaseUpdate('pos_orders', card.dbId, { items, customer_name: document.getElementById('edit-customer').value, note: document.getElementById('edit-note').value + (document.getElementById('edit-phone').value ? ' | Phone: ' + document.getElementById('edit-phone').value : ''), total: calcCardTotal(card), payment_status: card.paymentStatus, status: 'new' });
        showToast('Updated!', '💾'); renderGrid(); closeEditPanel();
      } catch (e) { }
      btn.disabled = false;
    });

    async function deleteOrder() {
      const card = allCards.find(c => c.id === editingCardId); if (!card) return;
      if (!confirm('Delete?')) return;
      try { if (card.status === 'sent') await supabaseDelete('pos_orders', card.dbId); allCards = allCards.filter(c => c.id !== editingCardId); saveToLocalStorage(); closeEditPanel(); } catch (e) { }
    }

    document.getElementById('edit-customer').addEventListener('input', validateDraftEnable);
    document.getElementById('edit-note').addEventListener('input', validateDraftEnable);
    document.getElementById('edit-phone').addEventListener('input', () => {
      const card = allCards.find(c => c.id === editingCardId); if (card) card.phone = document.getElementById('edit-phone').value.trim();
      updateWaButton(); validateDraftEnable();
    });

    function updateWaButton() {
      const card = allCards.find(c => c.id === editingCardId), btn = document.getElementById('btn-send-wa'), ph = document.getElementById('edit-phone').value.trim();
      if (card && ph.length === 10 && ph !== '0') {
        const msg = `Hi ${card.customerName || 'Customer'}! Your SNACITO order (${card.token}) for ₹${calcCardTotal(card)} is confirmed!`;
        btn.href = `https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`; btn.style.display = 'flex';
      } else btn.style.display = 'none';
    }

    function closeOnlineModal() { document.getElementById('online-modal').classList.remove('show'); }
    function openOnlineModal() { fetchOnlineOrders(); document.getElementById('online-modal').classList.add('show'); }

    async function fetchOnlineOrders() {
      try {
        const data = await supabaseSelect('orders', 'select=*&order=id.desc');
        onlineOrders = data || []; onlineOrderCount = onlineOrders.filter(o => !importedOnlineIds.includes(o.order_id)).length;
        const b = document.getElementById('ol-count-badge'); if (b) { b.textContent = onlineOrderCount + ' pending'; b.classList.toggle('zero', onlineOrderCount === 0); }
        renderOnlineModal();
      } catch (e) { }
    }

    function renderOnlineModal() {
      const body = document.getElementById('online-modal-body'); if (!body) return;
      let h = '';
      onlineOrders.forEach(o => {
        const imp = importedOnlineIds.includes(o.order_id);
        h += `<div class="online-order-row ${imp?'already-imported':''}" onclick="${imp?'':`importOnlineOrder('${o.order_id}')`}">
          <div class="oo-header"><div class="oo-id">${o.order_id}</div><div class="oo-amount">₹${o.amount}</div></div>
          <div class="oo-name">${o.name} · ${o.phone}</div>
          <div class="oo-items">${o.items}</div>
        </div>`;
      });
      body.innerHTML = h || 'No orders';
    }

    async function importOnlineOrder(id) {
      if (importedOnlineIds.includes(id)) return;
      const order = onlineOrders.find(o => o.order_id === id); if (!order) return;
      cardCounter++; const card = { id: 'draft-'+cardCounter, token: await generateToken(), cart: parseOnlineItems(order.items), customerName: order.name, note: 'Online Order '+id, phone: order.phone, status: 'draft', createdAt: new Date().toISOString(), paymentStatus: 'paid' };
      allCards.unshift(card); importedOnlineIds.push(id); saveToLocalStorage(); showToast('Imported!', '📱'); closeOnlineModal(); renderGrid(); openEditPanel(card.id);
    }

    function parseOnlineItems(text) {
      const cart = []; (text||'').split('\n').forEach(line => {
        const m = line.match(/^(.+?)\s*[×x]\s*(\d+)\s*=\s*₹(\d+)/);
        if (m) cart.push({ menuItem: findMenuItem(m[1].trim()) || { id: m[1].trim(), name: m[1].trim(), price: Math.round(m[3]/m[2]) }, qty: parseInt(m[2]), flavour: null, addons: [], paid: true });
      });
      return cart;
    }

    function logoutPos() { localStorage.removeItem('pos_logged_in'); location.reload(); }

    function showWaPopup(card, order) {
      const name = card.customerName || order.customer_name || 'Customer';
      let phone = ''; const note = card.note || order.note || '';
      const match = note.match(/Phone:\s*(?:\+?91)?\s*(\d{1,10})/); if (match) phone = match[1];
      if (phone && phone !== '0') {
        const msg = `Hi ${name}! Your SNACITO order (${card.token}) is *ready*! Please collect.`;
        showWaToast(`${card.token} is READY!`, `Customer: +91 ${phone}`, `https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
      } else showWaToast(`${card.token} is READY!`, `No phone number.`, '');
    }

    let readyNotifiedIds = new Set();
    loadFromLocalStorage(); loadSentOrders(); fetchOnlineOrders(); renderGrid(); startClock('clock');
    setInterval(async () => {
      try {
        const data = await supabaseSelect('pos_orders', 'select=*');
        data.forEach(o => {
          const c = allCards.find(card => card.token === o.token && card.status === 'sent');
          if (c) { if (c.dbStatus !== o.status) { c.dbStatus = o.status; if ((o.status==='ready'||o.status==='completed') && !readyNotifiedIds.has(o.id)) { readyNotifiedIds.add(o.id); showWaPopup(c, o); } } }
        });
        renderGrid(); fetchOnlineOrders();
      } catch (e) { }
    }, 5000);
  </script>
</body>
</html>
